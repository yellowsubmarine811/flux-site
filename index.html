<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FLUX — Los Angeles Creative Agency</title>
  <meta name="description" content="FLUX is a Los Angeles-based creative agency working with AI, brand, and product.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;500&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="home">

  <!-- Right Panel: Hero Video -->
  <main class="panel-right">
    <div class="hero-video-container">
      <video
        class="hero-video"
        src="/content/videos/hero.mp4"
        autoplay
        loop
        muted
        playsinline
        aria-hidden="true"
      ></video>
    </div>
  </main>

  <!-- Left Panel: Fixed sidebar -->
  <aside class="panel-left">

    <header class="panel-header">
      <p class="descriptor">
        [ INFO ] LOS ANGELES-BASED CREATIVE<br>
        AGENCY / WORKING WITH AI, BRAND, AND<br>
        PRODUCT
      </p>
      <a href="mailto:hello@flux.studio" class="btn-cta" aria-label="Book a call">BOOK A CALL ↗</a>
    </header>

    <div class="wordmark-container" aria-hidden="true">
      <h1 class="wordmark">FLUX</h1>
    </div>

    <nav id="projectList" class="project-list" aria-label="Selected works">
      <div class="list-header">
        <span>SELECTED WORKS</span>
        <span>YEAR</span>
      </div>
    </nav>

    <footer class="panel-footer">
      <p>©2024 FLUX ARCHITECTURAL EDITORIAL. ALL RIGHTS<br>
      RESERVED. [34.0522° N, 118.2437° W]</p>
    </footer>

  </aside>

  <script src="js/main.js"></script>
</body>
</html>
