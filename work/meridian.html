<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MERIDIAN — FLUX</title>
  <meta name="description" content="Meridian — Brand & Web project by FLUX, Los Angeles.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;500&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="case">

  <!-- Full-width fixed header — spans entire page -->
  <header class="case-header">
    <nav class="breadcrumb" aria-label="Breadcrumb">
      <a href="../index.html">WORK</a>
      <span aria-hidden="true">/</span>
      <span class="current">MERIDIAN</span>
    </nav>
    <a href="mailto:hello@flux.studio" class="btn-cta" aria-label="Book a call">BOOK A CALL ↗</a>
  </header>

  <!-- Left Panel: Fixed hero image -->
  <aside class="panel-left panel-left--case">
    <img
      class="case-hero-image"
      src="https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=1200"
      alt="Meridian project hero"
    />
  </aside>

  <!-- Right Panel: Scrollable case study content -->
  <main class="panel-right panel-right--case">
    <div class="case-content">

      <!-- Project metadata -->
      <section class="case-meta">
        <div class="meta-row">
          <span class="project-number">[ 01 ]</span>
        </div>
        <h1 class="case-title">MERIDIAN</h1>

        <div class="meta-field">
          <span class="meta-key">PROJECT</span>
          <span class="meta-value">[ PRJ_01 // MERIDIAN ]</span>
        </div>
        <div class="meta-field">
          <span class="meta-key">YEAR</span>
          <span class="meta-value">2025</span>
        </div>
        <div class="meta-field">
          <span class="meta-key">TAGS</span>
          <span class="meta-value">
            <span class="tag">BRAND</span>
            <span class="tag">WEB</span>
          </span>
        </div>

        <div class="case-intro">
          <span class="meta-key">[ INTRO ]</span>
          <p>"An exploration of geological permanence.
          Meridian transforms the ephemeral nature of
          light through the grounding weight of
          sedimentary stone."</p>
        </div>
      </section>

      <!-- Case study images -->
      <div class="case-images">

        <figure class="case-figure">
          <img
            src="https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=1200"
            alt="Meridian textural study — red product composition"
            loading="lazy"
          />
          <figcaption>
            <span>FIG. 01 // TEXTURAL STUDY</span>
            <button class="zoom-btn" aria-label="Zoom image">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="10.5" cy="10.5" r="6.5" stroke="currentColor" stroke-width="1.5"/>
                <line x1="10.5" y1="7.5" x2="10.5" y2="13.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="7.5" y1="10.5" x2="13.5" y2="10.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="15.5" y1="15.5" x2="20" y2="20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </button>
          </figcaption>
        </figure>

        <figure class="case-figure">
          <img
            src="https://images.unsplash.com/photo-1576091160399-112ba8d25d1d?w=1200"
            alt="Meridian textural study — clean form study"
            loading="lazy"
          />
          <figcaption>
            <span>FIG. 02 // FORM STUDY</span>
            <button class="zoom-btn" aria-label="Zoom image">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="10.5" cy="10.5" r="6.5" stroke="currentColor" stroke-width="1.5"/>
                <line x1="10.5" y1="7.5" x2="10.5" y2="13.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="7.5" y1="10.5" x2="13.5" y2="10.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="15.5" y1="15.5" x2="20" y2="20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </button>
          </figcaption>
        </figure>

        <figure class="case-figure">
          <img
            src="https://images.unsplash.com/photo-1497366216548-37526070297c?w=1200"
            alt="Meridian textural study — studio environment"
            loading="lazy"
          />
          <figcaption>
            <span>FIG. 03 // ENVIRONMENT</span>
            <button class="zoom-btn" aria-label="Zoom image">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="10.5" cy="10.5" r="6.5" stroke="currentColor" stroke-width="1.5"/>
                <line x1="10.5" y1="7.5" x2="10.5" y2="13.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="7.5" y1="10.5" x2="13.5" y2="10.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="15.5" y1="15.5" x2="20" y2="20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </button>
          </figcaption>
        </figure>

        <!-- Next Project -->
        <div class="next-project">
          <span class="next-label">NEXT PROJECT</span>
          <a href="aura.html" class="next-project-link">
            <span class="next-name">AURA →</span>
            <img
              class="next-project-thumb"
              src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=200"
              alt="Aura project thumbnail"
              loading="lazy"
            />
          </a>
        </div>

      </div><!-- /.case-images -->
    </div><!-- /.case-content -->
  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image zoom">
    <button class="lightbox-close" id="lightboxClose">[ CLOSE ✕ ]</button>
    <img id="lightboxImg" src="" alt="" />
  </div>

  <script src="../js/main.js"></script>
</body>
</html>
